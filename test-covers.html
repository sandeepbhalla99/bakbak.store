<!DOCTYPE html>
<html>
<head>
<title>Cover Test</title>
<style>
body { background: #111; color: white; font-family: sans-serif; padding: 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
.card { border: 1px solid #333; border-radius: 8px; overflow: hidden; }
.card img { width: 100%; height: 280px; object-fit: cover; display: block; }
.card .info { padding: 10px; }
.status { color: #0f0; font-size: 12px; }
.error { color: #f00; }
</style>
</head>
<body>
<h1>Bakbak Cover Image Test</h1>
<p>This page tests if cover images load directly. If you see images below, covers work. If not, there's a server/network issue.</p>
<div id="grid" class="grid"></div>
<script>
fetch('books/catalog.json?' + Date.now())
  .then(r => r.json())
  .then(books => {
    const grid = document.getElementById('grid');
    books.forEach(book => {
      if (!book.coverImage) return;
      const src = '/' + book.coverImage;
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="${src}" alt="${book.title}"
          onload="this.nextElementSibling.textContent='✅ Loaded (' + this.naturalWidth + 'x' + this.naturalHeight + ')'; this.nextElementSibling.className='status';"
          onerror="this.nextElementSibling.textContent='❌ FAILED to load: ${src}'; this.nextElementSibling.className='status error';">
        <span class="status">Loading...</span>
        <div class="info">
          <strong>${book.title}</strong><br>
          <small>${book.author}</small><br>
          <small style="color:#888">${src}</small>
        </div>
      `;
      grid.appendChild(card);
    });
  });
</script>
</body>
</html>
